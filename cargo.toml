[package]
name = "paluwagan-go"
version = "0.1.0"
edition = "2021"
description = "A Soroban-based paluwagan coordination system with immutable group rules, dual-confirmation payment tracking, transparent payout cycles, and behavior-based trust scoring"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = { version = "22.0.0", features = ["alloc"] }

[dev-dependencies]
soroban-sdk = { version = "22.0.0", features = ["testutils", "alloc"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true